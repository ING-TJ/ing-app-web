<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ING</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #607080;
      --line: #e4dfd4;
      --accent: #2f6f5e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 8vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      color: var(--accent);
    }

    .link-card {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfaf7;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .link-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="page-title">
      <h1 id="page-title">ING</h1>
      <p>用于后续 App Store Connect 填写 Privacy Policy URL 与 Support URL 的静态网页入口。</p>
      <p>ING helps people reference place status before heading out.</p>

      <nav aria-label="ING pages">
        <a class="link-card" href="./privacy.html">
          Privacy Policy
          <span>隐私政策草案</span>
        </a>
        <a class="link-card" href="./support.html">
          Support
          <span>支持与反馈草案</span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
